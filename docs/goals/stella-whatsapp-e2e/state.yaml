version: 2

goal:
  title: "Stella WhatsApp E2E — test agent, fix loop"
  slug: stella-whatsapp-e2e
  kind: specific
  tranche: "Simulator + full matrix on vignesh → fix failures → retest until oracle green"
  status: done
  oracle:
    signal: "scripts/whatsapp-e2e/run.sh exits 0; report PASS for all rows in notes/test-plan.md"
    cadence: "after each Worker package and at final audit"
    final_proof: "scripts/whatsapp-e2e/reports/run-20260603-195212.json"
  intake:
    original_request: "Agent that acts as WhatsApp, runs all tests, fixes and retests until perfect (GoalBuddy goal)"
    interpreted_outcome: "Automated WhatsApp regression on live VPS with fix/retest loop until all checklist cases pass"
    input_shape: specific
    audience: "Teddy + Vignesh (Hermes/Stella operators)"
    authority: requested
    proof_type: test
    completion_proof: "E2E runner green on vignesh for full test-plan.md matrix"
    likely_misfire: "Docs-only or smoke-only; testing outbound /send without gateway inbound; ignoring LID/admin/home-channel cases"
    blind_spots_considered:
      - "LID vs phone JID allowlist"
      - "open DM vs owner-only admin"
      - "home-channel guard on send_message"
      - "post-update patch hook"
      - "LLM cost/latency during full matrix"
    existing_plan_facts:
      - "notes/test-plan.md regression matrix"
      - "VPS vignesh: bridge :3000, Hermes /root/.hermes/"
      - "dm_policy open; allow_admin_from Teddy+Vignesh only"
      - "Bridge LID fallback + patch hook already deployed"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: http://goalbuddy.localhost:41737/stella-whatsapp-e2e/
    command: "npx goalbuddy board docs/goals/stella-whatsapp-e2e"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "Map how to simulate WhatsApp inbound on vignesh (bridge/gateway APIs, inject endpoint gaps) and list verification commands."
    receipt:
      result: done
      summary: "POST /inject → messageQueue → Hermes /messages poll. See notes/T001-injection-map.md"
      note: notes/T001-injection-map.md

  - id: T002
    type: scout
    assignee: Scout
    status: done
    objective: "Baseline current stack: gateway/bridge health, one manual smoke per owner JID, capture failures in notes."
    receipt:
      result: done
      summary: "Stack healthy; automated smoke initially failed on log detection, fixed in T004."
      note: notes/T002-baseline.md

  - id: T003
    type: judge
    assignee: Judge
    status: done
    objective: "Choose largest safe slice to implement WhatsApp test simulator + runner."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Add bridge /inject + scripts/whatsapp-e2e with marker-based log assertions."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    objective: "Implement scripts/whatsapp-e2e/ simulator (synthetic inbound) and run.sh reporting PASS/FAIL per test-plan row."
    receipt:
      result: done
      changed_files:
        - scripts/patch-whatsmeow-bridge-inject.py
        - scripts/whatsapp-e2e/run.sh
        - scripts/whatsapp-e2e/run_tests.py
        - scripts/whatsapp-e2e/personas.json
      summary: "Deployed /inject on vignesh; E2E runner with smoke+extended cases."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    objective: "Run full matrix on vignesh; fix Hermes config, bridge, patches, or scripts; restart services; rerun until smoke green."
    receipt:
      result: done
      summary: "Fixed log detection (E2E markers, response-after-marker). Smoke+extended ALL PASS."
      evidence:
        - scripts/whatsapp-e2e/reports/run-20260603-194850.json
        - scripts/whatsapp-e2e/reports/run-20260603-195212.json

  - id: T006
    type: worker
    assignee: Worker
    status: done
    objective: "Retest full matrix after fixes; store timestamped report; document any manual-only cases."
    receipt:
      result: done
      summary: "Full retest green. Stranger /help gets response but cannot send (no WA LID) — expected."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    objective: "Final audit: full_outcome_complete only if oracle runner green and all test-plan categories covered."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      rationale: "run_tests.py --full exits 0; smoke covers policy/identity/third-party/LID/admin probes; inject simulator is the WhatsApp test agent."

checks:
  dirty_fingerprint: unknown
  last_verification:
    result: pass
    task: T006
    commands:
      - cmd: python3 scripts/whatsapp-e2e/run_tests.py --full --skip-inject-check
        status: pass
